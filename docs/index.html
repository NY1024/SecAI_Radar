<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecAI Radar · AI Security Paper Tracker</title>
<meta name="description" content="Tracking AI security papers from top-tier conferences">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #f0f4f8;
            --bg-card: #ffffff;
            --bg-soft: #f1f5f9;
            --bg-hover: #f8fafc;
            --border: #e2e8f0;
            --border-strong: #cbd5e1;
            --text: #1e293b;
            --text-dim: #64748b;
            --text-light: #94a3b8;
            --accent: #6366f1;
            --accent-light: #818cf8;
            --accent-dark: #4f46e5;
            --accent-green: #10b981;
            --accent-orange: #f59e0b;
            --accent-red: #ef4444;
            --accent-purple: #8b5cf6;
            --accent-cyan: #06b6d4;
            --accent-pink: #ec4899;
            --accent-teal: #14b8a6;
            --shadow-xs: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -2px rgba(0,0,0,0.05);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -4px rgba(0,0,0,0.05);
            --shadow-xl: 0 20px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.05);
            --radius: 14px;
            --radius-sm: 8px;
            --radius-xs: 6px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* ===== Header ===== */
        .header {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 40%, #d946ef 100%);
            padding: 2.8rem 1rem 2.2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -60%; left: -30%;
            width: 160%; height: 200%;
            background: radial-gradient(ellipse at 30% 40%, rgba(255,255,255,0.12) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 60%, rgba(255,255,255,0.08) 0%, transparent 40%);
            pointer-events: none;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
        }

        .header h1 {
            font-size: 2.6rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 0.5rem;
            position: relative;
            letter-spacing: -0.02em;
        }

        .header .subtitle {
            color: rgba(255,255,255,0.9);
            font-size: 1.05rem;
            position: relative;
            max-width: 600px;
            margin: 0 auto;
        }

        .header .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 20px;
            padding: 0.3rem 1rem;
            font-size: 0.82rem;
            color: #fff;
            margin-top: 0.7rem;
            position: relative;
        }

        /* Lang Toggle */
        .lang-toggle {
            position: absolute;
            top: 1rem;
            right: 1rem;
            display: flex;
            gap: 0.3rem;
            z-index: 10;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 0.2rem;
        }

        .lang-btn {
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.7);
            padding: 0.3rem 0.7rem;
            border-radius: 16px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .lang-btn:hover { color: #fff; }
        .lang-btn.active { background: #fff; color: #6366f1; }

        /* ===== Stats Bar ===== */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
            padding: 1.5rem 1rem;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }

        .stat-item {
            text-align: center;
            min-width: 80px;
        }

        .stat-item .number {
            font-size: 1.9rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-purple) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.2;
        }

        .stat-item .label {
            font-size: 0.78rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-top: 0.15rem;
        }

        /* ===== Container ===== */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem 1rem;
        }

        /* ===== Charts ===== */
        .charts-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .chart-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.25rem 1.25rem 0.75rem;
            box-shadow: var(--shadow-sm);
            transition: box-shadow 0.2s;
        }

        .chart-card:hover { box-shadow: var(--shadow-md); }

        .chart-card h3 {
            font-size: 0.92rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }

        .chart-card canvas { max-height: 240px; }

        .charts-full { grid-column: 1 / -1; }

        /* ===== Filters ===== */
        .filters-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.25rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow-sm);
        }

        .filters-row {
            display: flex;
            gap: 0.9rem;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .filter-group label {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        select, .search-box {
            background: var(--bg-soft);
            border: 1px solid var(--border-strong);
            color: var(--text);
            padding: 0.5rem 0.8rem;
            border-radius: var(--radius-sm);
            font-size: 0.87rem;
            outline: none;
            transition: all 0.15s;
            cursor: pointer;
            font-family: inherit;
        }

        select:hover, .search-box:hover { border-color: var(--accent-light); }
        select:focus, .search-box:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
        }

        .search-box { cursor: text; min-width: 220px; flex: 1; }

        .filter-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 0.35rem;
            margin-top: 0.8rem;
        }

        .pill {
            background: var(--bg-soft);
            border: 1px solid var(--border-strong);
            color: var(--text-dim);
            padding: 0.3rem 0.75rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            transition: all 0.15s;
            user-select: none;
        }

        .pill:hover { border-color: var(--accent-light); color: var(--accent); }
        .pill.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
            box-shadow: 0 2px 8px rgba(99,102,241,0.3);
        }

        .btn-secondary {
            background: var(--bg-soft);
            border: 1px solid var(--border-strong);
            color: var(--text-dim);
            padding: 0.5rem 1rem;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.15s;
            font-family: inherit;
        }

        .btn-secondary:hover { border-color: var(--accent-red); color: var(--accent-red); }

        .result-count {
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-left: auto;
            align-self: center;
        }

        .result-count strong { color: var(--accent); font-weight: 700; }

        /* ===== Paper Cards ===== */
        .papers-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.75rem;
        }

        .paper-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.15rem 1.3rem;
            transition: all 0.2s;
            box-shadow: var(--shadow-xs);
            border-left: 3px solid transparent;
        }

        .paper-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-1px);
            border-left-color: var(--accent-light);
        }

        .paper-card .conf-badge {
            display: inline-block;
            font-size: 0.72rem;
            font-weight: 700;
            padding: 0.15rem 0.6rem;
            border-radius: 10px;
            margin-bottom: 0.5rem;
        }

        .paper-card .title {
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 0.35rem;
            line-height: 1.4;
        }

        .paper-card .title a { color: var(--text); }
        .paper-card .title a:hover { color: var(--accent); }

        .paper-card .authors {
            color: var(--text-dim);
            font-size: 0.85rem;
            margin-bottom: 0.4rem;
        }

        .paper-card .abstract-toggle {
            margin-top: 0.55rem;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--accent);
            background: var(--bg-soft);
            border: 1px solid var(--accent-light);
            padding: 0.3rem 0.75rem;
            border-radius: var(--radius-sm);
            transition: all 0.2s;
            user-select: none;
        }
        .paper-card .abstract-toggle:hover {
            background: var(--accent-light);
            color: white;
        }
        .paper-card .abstract-toggle .arrow {
            display: inline-block;
            transition: transform 0.25s;
            font-size: 0.7rem;
        }
        .paper-card .abstract-toggle.open .arrow {
            transform: rotate(90deg);
        }
        .paper-card .abstract-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease, margin-top 0.3s ease;
            margin-top: 0;
        }
        .paper-card .abstract-content.open {
            max-height: 500px;
            margin-top: 0.55rem;
        }
        .paper-card .abstract-content-inner {
            padding: 0.7rem 0.85rem;
            background: var(--bg-soft);
            border-radius: var(--radius-sm);
            font-size: 0.82rem;
            color: var(--text-dim);
            line-height: 1.55;
            border-left: 3px solid var(--accent-light);
        }

        .paper-card .keywords {
            display: flex;
            flex-wrap: wrap;
            gap: 0.25rem;
            margin-top: 0.4rem;
        }

        .keyword-tag {
            background: #f5f3ff;
            color: var(--accent-purple);
            border: 1px solid #ddd6fe;
            padding: 0.1rem 0.5rem;
            border-radius: 10px;
            font-size: 0.72rem;
        }

        .paper-card .meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.5rem;
            font-size: 0.78rem;
            color: var(--text-light);
        }

        .paper-card .meta .year { color: var(--accent-orange); font-weight: 700; }
        .paper-card .meta a { font-size: 0.78rem; }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.4rem;
            margin-top: 2rem;
            padding-bottom: 1rem;
            flex-wrap: wrap;
        }

        .page-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-strong);
            color: var(--text-dim);
            padding: 0.4rem 0.8rem;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.15s;
            font-family: inherit;
        }

        .page-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
        .page-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
        .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .page-info { color: var(--text-dim); font-size: 0.85rem; margin: 0 0.5rem; }

        /* ===== Footer ===== */
        .footer {
            text-align: center;
            padding: 2rem 1rem;
            border-top: 1px solid var(--border);
            color: var(--text-dim);
            font-size: 0.85rem;
            background: var(--bg-card);
        }

        /* ===== Loading / Empty ===== */
        .loading, .empty {
            text-align: center;
            padding: 3rem;
            color: var(--text-dim);
        }

        .loading .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===== Responsive ===== */
        @media (max-width: 768px) {
            .header h1 { font-size: 1.8rem; }
            .stats-bar { gap: 1.2rem; }
            .stat-item .number { font-size: 1.5rem; }
            .charts-section { grid-template-columns: 1fr; }
            .filters-row { flex-direction: column; align-items: stretch; }
            .search-box { min-width: auto; }
        }
    </style>
</head>
<body>
    <div class="lang-toggle">
        <button class="lang-btn active" id="btn-en">EN</button>
        <button class="lang-btn" id="btn-zh">中</button>
    </div>

    <header class="header">
        <h1>🛡️ SecAI Radar</h1>
        <p class="subtitle" id="header-subtitle"></p>
        <div class="badge" id="last-updated"></div>
    </header>

    <div class="stats-bar">
        <div class="stat-item">
            <div class="number" id="stat-total">-</div>
            <div class="label" id="label-papers"></div>
        </div>
        <div class="stat-item">
            <div class="number" id="stat-conferences">-</div>
            <div class="label" id="label-conferences"></div>
        </div>
        <div class="stat-item">
            <div class="number" id="stat-years">-</div>
            <div class="label" id="label-years"></div>
        </div>
        <div class="stat-item">
            <div class="number" id="stat-keywords">-</div>
            <div class="label" id="label-keywords"></div>
        </div>
    </div>

    <div class="container">
        <!-- Charts -->
        <div class="charts-section">
            <div class="chart-card">
                <h3 id="chart1-title"></h3>
                <canvas id="chart-conf"></canvas>
            </div>
            <div class="chart-card">
                <h3 id="chart2-title"></h3>
                <canvas id="chart-pie"></canvas>
            </div>
            <div class="chart-card charts-full">
                <h3 id="chart3-title"></h3>
                <canvas id="chart-trend" style="max-height:220px;"></canvas>
            </div>
        </div>

        <!-- Filters -->
        <div class="filters-section">
            <div class="filters-row">
                <div class="filter-group">
                    <label id="label-conf"></label>
                    <select id="conf-select"></select>
                </div>
                <div class="filter-group">
                    <label id="label-year"></label>
                    <select id="year-select"></select>
                </div>
                <div class="filter-group" style="flex:1; min-width:200px;">
                    <label id="label-search"></label>
                    <input type="text" class="search-box" id="search">
                </div>
                <button class="btn-secondary" id="reset-btn"></button>
                <span class="result-count" id="result-count"></span>
            </div>
            <div class="filter-pills" id="conf-pills"></div>
        </div>

        <!-- Papers -->
        <div class="papers-grid" id="papers-grid">
            <div class="loading">
                <div class="spinner"></div>
                <p id="loading-text"></p>
            </div>
        </div>

        <!-- Pagination -->
        <div class="pagination" id="pagination" style="display:none;"></div>
    </div>

    <footer class="footer">
        <p id="footer-text"></p>
<p><a href="https://github.com/NY1024/SecAI_Radar">GitHub Repository</a> · MIT License</p>
    </footer>

    <script>
        // ===== i18n =====
        const I18N = {
            en: {
                subtitle: "Tracking AI security papers from top-tier conferences",
                lastUpdated: "Last updated",
                loading: "Loading...",
                papers: "Papers", conferences: "Conferences",
                years: "Years", keywords: "Keywords",
                chart1: "📊 Papers by Conference",
                chart2: "🥧 Conference Distribution",
                chart3: "📈 Papers Trend by Year",
                confLabel: "Conference", yearLabel: "Year",
                searchLabel: "Search", searchPh: "🔍 Search title / authors / keywords...",
                reset: "↺ Reset", allConfs: "All Conferences", allYears: "All Years",
                papersFound: p => `<strong>${p}</strong> papers found`,
                noPapers: "📭 No matching papers.",
                loadFail: "⚠️ Failed to load data. Please retry later.",
                abstractLabel: "Abstract",
                showAbstract: "📖 Show Abstract",
                hideAbstract: "📖 Hide Abstract",
                footer: "SecAI Radar",
                pageOf: (c, t) => `${c} / ${t}`,
            },
            zh: {
                subtitle: "追踪顶级会议中的 AI 安全相关论文",
                lastUpdated: "最近更新",
                loading: "加载中...",
                papers: "总论文", conferences: "会议",
                years: "年份", keywords: "关键词",
                chart1: "📊 各会议论文分布",
                chart2: "🥧 会议论文占比",
                chart3: "📈 年度论文趋势",
                confLabel: "会议", yearLabel: "年份",
                searchLabel: "搜索", searchPh: "🔍 搜索标题 / 作者 / 关键词...",
                reset: "↺ 重置", allConfs: "全部会议", allYears: "全部年份",
                papersFound: p => `找到 <strong>${p}</strong> 篇论文`,
                noPapers: "📭 没有匹配的论文。",
                loadFail: "⚠️ 数据加载失败，请稍后重试。",
                abstractLabel: "摘要",
                showAbstract: "📖 展开摘要",
                hideAbstract: "📖 收起摘要",
                footer: "SecAI Radar",
                pageOf: (c, t) => `第 ${c} / ${t} 页`,
            }
        };

        function t(key, ...args) {
            const v = I18N[currentLang][key];
            return typeof v === "function" ? v(...args) : v;
        }

        // ===== Config =====
        const CONF_COLORS = {
            "S&P": "#ef4444", "CCS": "#f97316", "USENIX Security": "#eab308",
            "NDSS": "#f59e0b", "SaTML": "#10b981", "NeurIPS": "#3b82f6",
            "ICLR": "#6366f1", "ICML": "#8b5cf6", "AAAI": "#a855f7",
            "CVPR": "#06b6d4", "ECCV": "#0ea5e9", "EMNLP": "#ec4899",
        };
        const CONF_BG = Object.fromEntries(
            Object.entries(CONF_COLORS).map(([k, v]) => [k, v + "1a"])
        );

        // ===== State =====
        let allPapers = [];
        let currentConf = "all", currentYear = "all", searchTerm = "";
        let currentLang = "en", currentPage = 1;
        const PAGE_SIZE = 30;
        let charts = {};

        // ===== Language =====
        function setLang(lang) {
            currentLang = lang;
            document.getElementById("btn-en").classList.toggle("active", lang === "en");
            document.getElementById("btn-zh").classList.toggle("active", lang === "zh");
            applyI18n();
            if (allPapers.length > 0) {
                renderPapers();
                updateResultCount();
            }
            updateLastUpdated();
        }

        function applyI18n() {
            document.getElementById("header-subtitle").textContent = t("subtitle");
            document.getElementById("label-papers").textContent = t("papers");
            document.getElementById("label-conferences").textContent = t("conferences");
            document.getElementById("label-years").textContent = t("years");
            document.getElementById("label-keywords").textContent = t("keywords");
            document.getElementById("chart1-title").textContent = t("chart1");
            document.getElementById("chart2-title").textContent = t("chart2");
            document.getElementById("chart3-title").textContent = t("chart3");
            document.getElementById("label-conf").textContent = t("confLabel");
            document.getElementById("label-year").textContent = t("yearLabel");
            document.getElementById("label-search").textContent = t("searchLabel");
            document.getElementById("search").placeholder = t("searchPh");
            document.getElementById("reset-btn").textContent = t("reset");
            document.getElementById("footer-text").textContent = t("footer");

            const loadingEl = document.getElementById("loading-text");
            if (loadingEl) loadingEl.textContent = t("loading");

            // Update select options text
            const confSel = document.getElementById("conf-select");
            if (confSel.options[0]) confSel.options[0].textContent = t("allConfs");
            const yearSel = document.getElementById("year-select");
            if (yearSel.options[0]) yearSel.options[0].textContent = t("allYears");

            // Update pills "All" label
            const allPill = document.querySelector('.pill[data-conf="all"]');
            if (allPill) allPill.textContent = currentLang === "en" ? "All" : "全部";

            // Re-render charts with localized labels
            if (allPapers.length) renderCharts();
        }

        function updateLastUpdated() {
            if (!allPapers.length) {
                document.getElementById("last-updated").textContent = t("loading");
                return;
            }
            // stored from loadData
            if (window._lastUpdated) {
                const d = new Date(window._lastUpdated);
                const fmt = d.toLocaleString(
                    currentLang === "en" ? "en-US" : "zh-CN",
                    { dateStyle: "short", timeStyle: "short" }
                );
                document.getElementById("last-updated").textContent = `${t("lastUpdated")}: ${fmt}`;
            }
        }

        document.getElementById("btn-en").addEventListener("click", () => setLang("en"));
        document.getElementById("btn-zh").addEventListener("click", () => setLang("zh"));

        // ===== Load Data =====
        async function loadData() {
            try {
                const resp = await fetch("papers.json");
                const data = await resp.json();
                allPapers = data.papers || [];
                window._lastUpdated = data.last_updated || null;
                updateStats(data);
                initFilters();
                applyI18n();
                renderCharts();
                renderPapers();
                updateLastUpdated();
            } catch (e) {
                document.getElementById("papers-grid").innerHTML = `<div class="empty">${t("loadFail")}</div>`;
                console.error("SecAI Radar load error:", e);
            }
        }

        // ===== Stats =====
        function updateStats(data) {
            const stats = data.stats || {};
            document.getElementById("stat-total").textContent = stats.total_papers || allPapers.length;
            document.getElementById("stat-conferences").textContent = new Set(allPapers.map(p => p.conference)).size;
            document.getElementById("stat-years").textContent = new Set(allPapers.map(p => p.year)).size;
            const kw = new Set();
            allPapers.forEach(p => (p.matched_keywords || []).forEach(k => kw.add(k)));
            document.getElementById("stat-keywords").textContent = kw.size;
        }

        // ===== Filters =====
        function initFilters() {
            const confs = [...new Set(allPapers.map(p => p.conference))].sort();
            const years = [...new Set(allPapers.map(p => p.year))].sort((a, b) => b - a);

            const confSel = document.getElementById("conf-select");
            confSel.innerHTML = `<option value="all">${t("allConfs")}</option>`;
            confs.forEach(c => {
                const o = document.createElement("option");
                o.value = c; o.textContent = c;
                confSel.appendChild(o);
            });

            const yearSel = document.getElementById("year-select");
            yearSel.innerHTML = `<option value="all">${t("allYears")}</option>`;
            years.forEach(y => {
                const o = document.createElement("option");
                o.value = y; o.textContent = y;
                yearSel.appendChild(o);
            });

            // Pills
            const pills = document.getElementById("conf-pills");
            const allLbl = currentLang === "en" ? "All" : "全部";
            pills.innerHTML = `<span class="pill active" data-conf="all">${allLbl}</span>` +
                confs.map(c => `<span class="pill" data-conf="${c}">${c}</span>`).join("");

            // Events
            confSel.addEventListener("change", e => { currentConf = e.target.value; currentPage = 1; syncPills(); renderPapers(); });
            yearSel.addEventListener("change", e => { currentYear = e.target.value; currentPage = 1; renderPapers(); });
            document.getElementById("search").addEventListener("input", e => { searchTerm = e.target.value; currentPage = 1; renderPapers(); });
            document.getElementById("reset-btn").addEventListener("click", resetFilters);

            pills.querySelectorAll(".pill").forEach(pill => {
                pill.addEventListener("click", () => {
                    pills.querySelectorAll(".pill").forEach(p => p.classList.remove("active"));
                    pill.classList.add("active");
                    currentConf = pill.dataset.conf;
                    confSel.value = currentConf;
                    currentPage = 1;
                    renderPapers();
                });
            });
        }

        function syncPills() {
            document.querySelectorAll(".pill").forEach(p => p.classList.toggle("active", p.dataset.conf === currentConf));
        }

        function resetFilters() {
            currentConf = "all"; currentYear = "all"; searchTerm = ""; currentPage = 1;
            document.getElementById("conf-select").value = "all";
            document.getElementById("year-select").value = "all";
            document.getElementById("search").value = "";
            syncPills();
            renderPapers();
        }

        // ===== Charts =====
        function renderCharts() {
            const confCounts = {}, yearCounts = {};
            allPapers.forEach(p => {
                const c = p.conference || "Unknown";
                confCounts[c] = (confCounts[c] || 0) + 1;
                const y = p.year || "Unknown";
                yearCounts[y] = (yearCounts[y] || 0) + 1;
            });

            Object.values(charts).forEach(c => c && c.destroy());
            charts = {};

            const confSorted = Object.entries(confCounts).sort((a, b) => b[1] - a[1]);

            // Chart 1: Bar by conference
            charts.conf = new Chart(document.getElementById("chart-conf"), {
                type: "bar",
                data: {
                    labels: confSorted.map(e => e[0]),
                    datasets: [{
                        data: confSorted.map(e => e[1]),
                        backgroundColor: confSorted.map(e => CONF_COLORS[e[0]] || "#94a3b8"),
                        borderRadius: 6, borderSkipped: false,
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false }, tooltip: { backgroundColor: "#1e293b", cornerRadius: 8, padding: 10 } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: "#f1f5f9" }, ticks: { color: "#94a3b8" } },
                        x: { grid: { display: false }, ticks: { color: "#64748b", font: { size: 11 } } }
                    }
                }
            });

            // Chart 2: Doughnut by conference
            charts.pie = new Chart(document.getElementById("chart-pie"), {
                type: "doughnut",
                data: {
                    labels: confSorted.map(e => e[0]),
                    datasets: [{
                        data: confSorted.map(e => e[1]),
                        backgroundColor: confSorted.map(e => CONF_COLORS[e[0]] || "#94a3b8"),
                        borderWidth: 2, borderColor: "#fff", hoverOffset: 8,
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false, cutout: "60%",
                    plugins: { legend: { position: "right", labels: { color: "#64748b", padding: 10, usePointStyle: true, pointStyle: "circle", font: { size: 11 } } },
                               tooltip: { backgroundColor: "#1e293b", cornerRadius: 8 } }
                }
            });

            // Chart 3: Stacked bar by year, per conference
            const years = Object.keys(yearCounts).sort();
            const topConfs = confSorted.slice(0, 6).map(e => e[0]);
            const datasets = topConfs.map(c => ({
                label: c,
                data: years.map(y => allPapers.filter(p => String(p.year) === y && p.conference === c).length),
                backgroundColor: CONF_COLORS[c] || "#94a3b8",
                borderRadius: 3, stack: "s1",
            }));

            charts.trend = new Chart(document.getElementById("chart-trend"), {
                type: "bar",
                data: { labels: years, datasets },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { position: "bottom", labels: { color: "#64748b", usePointStyle: true, pointStyle: "rect", font: { size: 11 } } },
                               tooltip: { backgroundColor: "#1e293b", cornerRadius: 8 } },
                    scales: {
                        y: { stacked: true, beginAtZero: true, grid: { color: "#f1f5f9" }, ticks: { color: "#94a3b8" } },
                        x: { stacked: true, grid: { display: false }, ticks: { color: "#64748b" } }
                    }
                }
            });
        }

        // ===== Filter Papers =====
        function getFilteredPapers() {
            let f = allPapers;
            if (currentConf !== "all") f = f.filter(p => p.conference === currentConf);
            if (currentYear !== "all") f = f.filter(p => String(p.year) === String(currentYear));
            if (searchTerm) {
                const t2 = searchTerm.toLowerCase();
                f = f.filter(p =>
                    p.title.toLowerCase().includes(t2) ||
                    (p.authors || []).some(a => a.toLowerCase().includes(t2)) ||
                    (p.matched_keywords || []).some(k => k.toLowerCase().includes(t2))
                );
            }
            f.sort((a, b) => (b.year || 0) - (a.year || 0));
            return f;
        }

        function updateResultCount() {
            document.getElementById("result-count").innerHTML = t("papersFound", getFilteredPapers().length);
        }

        // ===== Render Papers =====
        function renderPapers() {
            const filtered = getFilteredPapers();
            updateResultCount();

            const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
            if (currentPage > totalPages) currentPage = 1;
            const start = (currentPage - 1) * PAGE_SIZE;
            const pagePapers = filtered.slice(start, start + PAGE_SIZE);

            const grid = document.getElementById("papers-grid");

            if (filtered.length === 0) {
                grid.innerHTML = `<div class="empty">${t("noPapers")}</div>`;
                document.getElementById("pagination").style.display = "none";
                return;
            }

            grid.innerHTML = pagePapers.map(p => {
                const color = CONF_COLORS[p.conference] || "#64748b";
                const authors = (p.authors || []).slice(0, 4).join(", ");
                const authorsStr = (p.authors || []).length > 4 ? authors + " et al." : authors;
                const keywords = (p.matched_keywords || []).slice(0, 5).map(k =>
                    `<span class="keyword-tag">${escapeHtml(k)}</span>`
                ).join("");
                const abstractHtml = p.abstract
                    ? `<div class="abstract-toggle" onclick="toggleAbstract(this)"><span class="arrow">▶</span> ${t("showAbstract")}</div><div class="abstract-content"><div class="abstract-content-inner"><strong style="color:var(--text);">${t("abstractLabel")}:</strong> ${escapeHtml(p.abstract)}</div></div>`
                    : "";
                const link = p.url ? `<a href="${p.url}" target="_blank">📄 ${currentLang === "en" ? "Paper" : "论文"}</a>` : "";

                return `
                    <div class="paper-card" style="border-left-color:${color}33;">
                        <span class="conf-badge" style="background:${CONF_BG[p.conference] || "#e2e8f0"}; color:${color}; border:1px solid ${color}44;">${p.conference} ${p.year}</span>
                        <div class="title"><a href="${p.url || '#'}" target="_blank">${escapeHtml(p.title)}</a></div>
                        <div class="authors">${escapeHtml(authorsStr)}</div>
                        ${keywords ? `<div class="keywords">${keywords}</div>` : ""}
                        ${abstractHtml}
                        <div class="meta">
                            <span class="year">${p.year}</span>
                            <span>${link}</span>
                        </div>
                    </div>
                `;
            }).join("");

            renderPagination(totalPages);
        }

        function toggleAbstract(el) {
            const content = el.nextElementSibling;
            const isOpen = el.classList.toggle("open");
            content.classList.toggle("open", isOpen);
            const arrow = el.querySelector(".arrow");
            arrow.textContent = isOpen ? "▼" : "▶";
            el.lastChild.textContent = " " + t(isOpen ? "hideAbstract" : "showAbstract");
        }

        function renderPagination(totalPages) {
            const pag = document.getElementById("pagination");
            if (totalPages <= 1) { pag.style.display = "none"; return; }
            pag.style.display = "flex";

            let html = `<button class="page-btn" onclick="goPage(${currentPage - 1})" ${currentPage === 1 ? "disabled" : ""}>←</button>`;
            const maxBtns = 7;
            let sp = Math.max(1, currentPage - 3);
            let ep = Math.min(totalPages, sp + maxBtns - 1);
            if (ep - sp < maxBtns - 1) sp = Math.max(1, ep - maxBtns + 1);
            if (sp > 1) { html += `<button class="page-btn" onclick="goPage(1)">1</button>`; if (sp > 2) html += `<span class="page-info">...</span>`; }
            for (let i = sp; i <= ep; i++) html += `<button class="page-btn ${i === currentPage ? "active" : ""}" onclick="goPage(${i})">${i}</button>`;
            if (ep < totalPages) { if (ep < totalPages - 1) html += `<span class="page-info">...</span>`; html += `<button class="page-btn" onclick="goPage(${totalPages})">${totalPages}</button>`; }
            html += `<button class="page-btn" onclick="goPage(${currentPage + 1})" ${currentPage === totalPages ? "disabled" : ""}>→</button>`;
            html += `<span class="page-info">${t("pageOf", currentPage, totalPages)}</span>`;
            pag.innerHTML = html;
        }

        function goPage(p) { currentPage = p; renderPapers(); window.scrollTo({ top: 0, behavior: "smooth" }); }
        window.goPage = goPage;

        function escapeHtml(text) {
            const div = document.createElement("div");
            div.textContent = text || "";
            return div.innerHTML;
        }

        // Init
        setLang("en");
        loadData();
    </script>
</body>
</html>

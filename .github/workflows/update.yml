name: SecAI_Radar Daily Update

on:
  schedule:
    # 每天 UTC 2:00 运行（北京时间 10:00）
    - cron: "0 2 * * *"
  workflow_dispatch:
    # 支持手动触发

permissions:
  contents: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run scraper
        run: |
          python scripts/main.py --all

      - name: Copy data to docs
        run: |
          cp data/papers.json docs/papers.json

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/papers.json README.md docs/papers.json docs/index.html
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🤖 Auto-update: $(date -u +%Y-%m-%d) AI security papers"
            git push
          fi
